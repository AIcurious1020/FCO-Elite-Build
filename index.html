<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCO-Elite — Football Club Owner</title>
  <link rel="stylesheet" href="css/styles.css?v=20260716-squad-role-recruitment" />
</head>
<body>
  <header class="header">
    <div class="header-top">
      <h1>FCO-<span class="accent">Elite</span></h1>
      <div class="club-badge" id="clubBadge">
        <span class="club-name" id="headerClubName">—</span>
        <span class="club-cash" id="headerCash">£0</span>
      </div>
      <button class="header-home" id="headerHome" hidden>Dashboard</button>
    </div>
  </header>

  <main class="main">
    <section id="dashboard" class="tab-content"></section>
    <section id="news" class="tab-content" hidden></section>
    <section id="club" class="tab-content" hidden></section>
    <section id="boardroom" class="tab-content" hidden></section>
    <section id="squad" class="tab-content" hidden></section>
    <section id="manager" class="tab-content" hidden></section>
    <section id="fixtures" class="tab-content" hidden></section>
    <section id="cup" class="tab-content" hidden></section>
    <section id="table" class="tab-content" hidden></section>
    <section id="transfers" class="tab-content" hidden></section>
    <section id="finance" class="tab-content" hidden></section>
    <section id="stadium" class="tab-content" hidden></section>
  </main>

  <!-- Match modal -->
  <div id="matchModal" class="modal" hidden>
    <div class="modal-box">
      <div id="matchModalContent"></div>
      <button class="btn" id="closeMatchModal">Close</button>
    </div>
  </div>

  <div id="transferModal" class="modal" hidden>
    <div class="modal-box">
      <div id="transferModalContent"></div>
    </div>
  </div>

  <footer class="footer">
    <span id="saveStatus" class="muted">Autosave on</span>
    <button class="btn-ghost" id="resetGame">Reset Game</button>
  </footer>

  <script type="module" src="js/app.js?v=20260716-squad-role-recruitment"></script>
</body>
</html>
